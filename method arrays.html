<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Arrays</title>
</head>
<body>
    <script>
        let colors = ["White", "Black", "Red","Blue"]

        console.log(colors)


        console.log("After push Method")

        colors.push("yellow");
        console.log(colors)

        console.log("after pop")

        colors.pop()
        console.log(colors)

        console.log("after unshift")

        colors.unshift("purple")
        console.log(colors)

        console.log("after shift")

        colors.shift()
        console.log(colors)

        console.log(colors.length)
        

    </script>
</body>
</html>
