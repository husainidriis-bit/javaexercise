<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logic operators</title>
</head>
<body>
    <script>

    let isSunny =  true 
    let isWeekend = true

    console.log (isSunny && isWeekend);
    console.log (isSunny || isWeekend);
    console.log (!isSunny || isWeekend);

    
    </script>
</body>
</html>
