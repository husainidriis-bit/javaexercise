<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function expression and parameter arguament</title>
</head>
<body>
    <script>
        // function parameters arguments
        function add(a, b) {
            console.log(a + b)
        }
        add(10,5)
        add(10,30)
        add(60,5)
        add(6,29)

        // function expression

        let sum = function (a, b){
             console.log(a + b)
            
            
        }
    
        sum(8,10)
        sum(10,5)
        sum(99,1)

        
    </script>
</body>
</html>
